  UNKNOWN_VISIBILITY = 0;
  NO_ONE = 1;
  ALL_CONTACTS = 2;
  SELECTED_CONTACTS = 3;
  EVERYONE = 4;
  HIDDEN = 5;
  SELF_SHARE = 6;
}

enum DeviceType {
  UNKNOWN_DEVICE_TYPE = 0;
  PHONE = 1;
  TABLET = 2;
  LAPTOP = 3;
}

enum OSType {
  UNKNOWN_OS_TYPE = 0;
  ANDROID = 1;
  CHROME_OS = 2;
  WINDOWS = 3;
  APPLE = 4;
}

enum DataUsage {
  UNKNOWN_DATA_USAGE = 0;
  NOT_APPLICABLE = 1;
  OFFLINE = 2;
  ONLINE = 3;
  WIFI_ONLY = 4;
}

enum SyncType {
  UNKNOWN_SYNC_TYPE = 0;
  ALL_CONTACTS_SYNC = 1;
  CONTACT_CERTIFICATES_SYNC = 2;
  SELF_CERTIFICATES_SYNC = 3;
