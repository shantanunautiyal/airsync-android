}

enum SessionStatus {
  UNKNOWN_SESSION_STATUS = 0;
  SUCCEEDED = 1;
  FAILED = 2;
  CANCELLED = 3;
  TIMED_OUT = 4;
  REJECTED = 5;
  NOT_ENOUGH_SPACE = 6;
  UNSUPPORTED_ATTACHMENT_TYPE = 7;
